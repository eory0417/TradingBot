[theme]
# 다크 모드 — 눈 fatigue 완화용 짙은 회색 배경
base = "dark"
primaryColor = "#58a6ff"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#E6EDF3"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# 8501은 다른 프로그램이 사용 중이므로 8502로 변경.
port = 8502
# transformers 비전 서브모듈(torchvision 미설치) 스캔 시 watcher 오류 로그 스팸 방지.
fileWatcherType = "none"
